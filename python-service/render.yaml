services:
  - type: web
    name: auto-insights-python
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: EXECUTION_TIMEOUT
        value: "30"
      - key: MAX_FILE_SIZE_MB
        value: "50"
